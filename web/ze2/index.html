<!doctype html>
<html lang="zh-Hant">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ze2 web</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/xterm@5.3.0/css/xterm.css" />
    <style>
      html,
      body {
        height: 100%;
        margin: 0;
        overflow: hidden;
        background: #111;
        color: #eee;
        font-family: system-ui, sans-serif;
      }

      body {
        display: grid;
        grid-template-rows: auto 1fr;
      }

      .toolbar {
        display: flex;
        gap: 8px;
        align-items: center;
        background: #202020;
        border-bottom: 1px solid #333;
        font-size: 10pt;
        padding: 8px;
      }

      .toolbar span {
        font-weight: bold;
        font-size: 14pt;
        margin-right:auto;
      }

      button {
        border: 1px solid #555;
        background: #2f2f2f;
        color: #eee;
        padding: 6px 10px;
        font: inherit;
      }

      .font-choice {
        display: inline-flex;
        gap: 4px;
        align-items: center;
      }

      #terminal {
        min-height: 0;
        overflow: hidden;
      }

      #terminal .xterm-viewport {
        overflow: hidden !important;
      }
    </style>
  </head>
  <body>
    <div class="toolbar">
      <span>ze2 (WASM+xterm.js)</span>
      <button id="open">讀檔</button>
      <button id="save">存檔</button>
      <label class="font-choice">
        <input type="radio" name="font" id="font-standard" value="standard" checked />
        標準字體
      </label>
      <label class="font-choice">
        <input type="radio" name="font" id="font-ming" value="ming" />
        細明體
      </label>
      <label class="font-choice">
        <input type="radio" name="font" id="font-kai" value="kai" />
        標楷體
      </label>
    </div>
    <div id="terminal"></div>

    <script src="https://cdn.jsdelivr.net/npm/xterm@5.3.0/lib/xterm.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-fit@0.8.0/lib/xterm-addon-fit.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xterm-addon-unicode11@0.6.0/lib/xterm-addon-unicode11.js"></script>
    <script type="module" src="./main.js"></script>
  </body>
</html>
